<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <!-- Logo Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Glowing Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Panel (Clean Gradient with Rounded Borders) -->
  <rect width="600" height="200" rx="24" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="2"/>

  <!-- Centered Typography Group -->
  <g>
    <!-- Main Title "LIFTY OS" -->
    <text x="300" y="122" 
          text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-size="116" 
          letter-spacing="4">
      <tspan font-weight="900" fill="url(#accent-grad)" filter="url(#glow)">LIFTY</tspan>
      <tspan font-weight="300" fill="#f8fafc" letter-spacing="2"> OS</tspan>
    </text>
          
    <!-- Decorative Separator Line -->
    <line x1="50" y1="142" x2="550" y2="142" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Subtitle / Tagline -->
    <text x="300" y="168" 
          text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-size="17" 
          font-weight="700" 
          letter-spacing="7" 
          fill="#94a3b8">AUTOREGULATED AI COACH</text>
  </g>
</svg>
